function renderLog() {
  const panel = document.getElementById('logPanel');
  const startIdx = panel.children.length;
  for (let i = startIdx; i < G.log.length; i++) {
    const entry = G.log[i];
    const div = document.createElement('div');
    div.className = `log-entry ${entry.cls}`;
    div.textContent = entry.msg;
    panel.appendChild(div);
  }
  panel.scrollTop = panel.scrollHeight;
}

function render() {
  if (!G) return;
  renderHeroes();
  renderInfo();
  renderLog();
  const status = G.gameOver
    ? (G.victory ? `🎉 VICTORY in ${G.turn} turns!` : `💀 GAME OVER at turn ${G.turn}`)
    : `Turn ${G.turn} · Round ${G.round} · ${G.heroes[G.currentHero].name}'s turn`;
  document.getElementById('statusBar').textContent = status;
}

// ========== ANALYSIS ENGINE ==========
function generateReport(results) {
  const n = results.length;
  const wins = results.filter(r => r.victory).length;
  const winRate = ((wins / n) * 100).toFixed(1);
  const avgTurns = (results.reduce((s, r) => s + r.turn, 0) / n).toFixed(1);
  const avgKO = (results.reduce((s, r) => s + r.stats.ko, 0) / n).toFixed(1);
  const avgCombats = (results.reduce((s, r) => s + r.stats.combats, 0) / n).toFixed(1);
  const avgRelicsSpent = (results.reduce((s, r) => s + r.stats.relicsSpent, 0) / n).toFixed(1);
  const avgSkillBurns = (results.reduce((s, r) => s + r.stats.skillBurns, 0) / n).toFixed(1);
  const heroNames = {juju:'Juju',gigi:'Gigi',lulu:'Lulu',eggo:'Eggo'};
  const heroIds = ['juju','gigi','lulu','eggo'];

  let html = `<h2>PLAYTEST REPORT</h2>`;
  html += `<p style="color:var(--dim);font-size:11px;margin-bottom:12px">Skills are disabled. Only Innate Talents, Equipment, Followers, and Skill Burn (reroll) affect outcomes. This shows what the game looks like before skills are added.</p>`;
  html += `<div class="report-section"><h3>Overview (${n} games)</h3>`;
  html += `<div class="report-card">`;
  html += `<div class="report-stat"><span class="rl">Win Rate</span><span class="rv" style="color:${winRate > 50 ? 'var(--heal)' : 'var(--ko)'}">${winRate}% (${wins}/${n})</span></div>`;
  html += `<div class="report-stat"><span class="rl">Avg Turns</span><span class="rv">${avgTurns}</span></div>`;
  html += `<div class="report-stat"><span class="rl">Avg Combats</span><span class="rv">${avgCombats}</span></div>`;
  html += `<div class="report-stat"><span class="rl">Avg KOs</span><span class="rv">${avgKO}</span></div>`;
  html += `<div class="report-stat"><span class="rl">Avg Skill Burns</span><span class="rv">${avgSkillBurns}</span></div>`;
  html += `<div class="report-stat"><span class="rl">Avg Relics Spent</span><span class="rv">${avgRelicsSpent}</span></div>`;
  // Overview commentary
  let overviewNote = '';
  if (winRate > 70) overviewNote = `Win rate is high (${winRate}%). Without skills this means the base stats + equipment are already strong enough to win consistently. When you add skills the win rate will go even higher. Consider making the dungeon or Hydra harder to compensate.`;
  else if (winRate > 50) overviewNote = `Win rate is balanced (${winRate}%). Adding skills should push it higher, so current difficulty is a good baseline.`;
  else if (winRate > 30) overviewNote = `Win rate is low-ish (${winRate}%). Skills will be important to make the game winnable. This is a good baseline if you want skills to feel impactful.`;
  else overviewNote = `Win rate is very low (${winRate}%). Even with skills, winning will be hard. Consider reducing enemy density or Hydra STR.`;
  if (avgKO > 3) overviewNote += ` Heroes average ${avgKO} KOs/game which is high and will feel punishing.`;
  if (avgSkillBurns > 5) overviewNote += ` High Skill Burn usage (${avgSkillBurns}/game) means heroes rely heavily on rerolls. Skills that provide alternatives to Skill Burn would feel meaningful.`;
  html += `</div><div class="report-card insight" style="margin-top:6px"><span class="tag insight-tag">Analysis</span>${overviewNote}</div></div>`;

  // === PER-HERO ANALYSIS ===
  html += `<div class="report-section"><h3>Hero Performance</h3>`;
  html += `<p style="color:var(--dim);font-size:10px;margin-bottom:8px">Without skills active. Shows each hero's raw combat effectiveness based on base STR, equipment, and talents only.</p>`;
  heroIds.forEach(hid => {
    const agg = { combats:0, wins:0, losses:0, ko:0, skillsBurned:0, damageDealt:0, damageTaken:0, relicsSpent:0, gaps:[] };
    results.forEach(r => {
      const ht = r.tracker.heroes[hid];
      if (!ht) return;
      agg.combats += ht.combats;
      agg.wins += ht.wins;
      agg.losses += ht.losses;
      agg.ko += ht.ko;
      agg.skillsBurned += ht.skillsBurned;
      agg.damageDealt += ht.damageDealt;
      agg.damageTaken += ht.damageTaken;
      agg.relicsSpent += ht.relicsSpent;
      ht.neededButDidntHave.forEach(g => agg.gaps.push(g));
    });
    const wr = agg.combats > 0 ? ((agg.wins / agg.combats) * 100).toFixed(0) : 'N/A';
    const avgMarginW = agg.wins > 0 ? (agg.damageDealt / agg.wins).toFixed(1) : '0';
    const avgMarginL = agg.losses > 0 ? (agg.damageTaken / agg.losses).toFixed(1) : '0';
    html += `<div class="report-card">`;
    html += `<b style="color:var(--${hid})">${heroNames[hid]}</b>`;
    html += `<div class="report-stat"><span class="rl">Combats</span><span class="rv">${agg.combats} (${wr}% win)</span></div>`;
    html += `<div class="report-stat"><span class="rl">KOs</span><span class="rv">${agg.ko} (${(agg.ko/n).toFixed(1)}/game)</span></div>`;
    html += `<div class="report-stat"><span class="rl">Avg Win Margin</span><span class="rv">+${avgMarginW}</span></div>`;
    html += `<div class="report-stat"><span class="rl">Avg Loss Margin</span><span class="rv">-${avgMarginL}</span></div>`;
    html += `<div class="report-stat"><span class="rl">Skill Burns</span><span class="rv">${agg.skillsBurned}</span></div>`;
    html += `<div class="report-stat"><span class="rl">Relics Spent</span><span class="rv">${agg.relicsSpent}</span></div>`;
    html += `</div>`;

    // Skill gap analysis for this hero
    if (agg.gaps.length > 0) {
      const gapTypes = {};
      agg.gaps.forEach(g => {
        const key = g.type;
        if (!gapTypes[key]) gapTypes[key] = { count: 0, examples: [], totalMargin: 0 };
        gapTypes[key].count++;
        gapTypes[key].totalMargin += g.margin;
        if (gapTypes[key].examples.length < 3) gapTypes[key].examples.push(g);
      });
      Object.entries(gapTypes).forEach(([type, data]) => {
        if (data.count < 2) return; // skip noise
        const avgM = (data.totalMargin / data.count).toFixed(1);
        const ex = data.examples[0];
        let suggestion = '';
        if (type === 'close_loss') {
          suggestion = `${heroNames[hid]} lost ${data.count} close fights (avg margin: ${avgM}). A +2 ATK skill or STR buff would have turned ${Math.min(data.count, Math.ceil(data.count * 0.7))} of these into wins.`;
        } else if (type === 'no_equip') {
          suggestion = `${heroNames[hid]} fought ${data.count} times without equipment. A skill that grants temporary STR or an equipment-retrieval ability would help.`;
        } else if (type === 'outmatched') {
          suggestion = `${heroNames[hid]} was outmatched ${data.count} times (avg margin: ${avgM}). Needs avoidance (flee/redirect), damage reduction, or a way to weaken enemies before combat.`;
        }
        if (suggestion) {
          html += `<div class="report-card need"><span class="tag need-tag">Skill Gap</span>${suggestion}</div>`;
        }
      });
    }
  });
  html += `</div>`;

  // === EQUIPMENT BALANCE ===
  html += `<div class="report-section"><h3>Equipment Balance</h3>`;
  html += `<p style="color:var(--dim);font-size:10px;margin-bottom:8px">Win rate = % of combats won while holding this item. High win rates are expected for high-STR weapons, but 100% means the item removes all combat risk.</p>`;
  const equipAgg = {};
  results.forEach(r => {
    Object.entries(r.tracker.equipment).forEach(([name, data]) => {
      if (!equipAgg[name]) equipAgg[name] = { equipped:0, wonWith:0, lostWith:0, survivedKO:0 };
      equipAgg[name].equipped += data.equipped;
      equipAgg[name].wonWith += data.wonWith;
      equipAgg[name].lostWith += data.lostWith;
      equipAgg[name].survivedKO += data.survivedKO;
    });
  });
  const equipData = LEGENDARY_EQUIPMENT.reduce((m,e) => { m[e.name] = e; return m; }, {});
  Object.entries(equipAgg).filter(([,d]) => d.equipped >= 2).sort((a,b) => {
    const wrA = a[1].wonWith / Math.max(1, a[1].wonWith + a[1].lostWith);
    const wrB = b[1].wonWith / Math.max(1, b[1].wonWith + b[1].lostWith);
    return wrB - wrA;
  }).forEach(([name, d]) => {
    const total = d.wonWith + d.lostWith;
    const wr = total > 0 ? ((d.wonWith / total) * 100).toFixed(0) : 'N/A';
    const isOP = total >= 5 && wr >= 85;
    const isWeak = total >= 5 && wr <= 30;
    const cls = isOP ? 'op' : isWeak ? 'weak' : '';
    const tag = isOP ? '<span class="tag op-tag">OP</span>' : isWeak ? '<span class="tag weak-tag">Weak</span>' : '';
    const eq = equipData[name] || {};
    let comment = '';
    if (isOP) {
      if ((eq.str || 0) >= 2 && eq.type === 'weapon') {
        comment = ` The +${eq.str} STR alone makes most Mishap enemies trivial (STR 1-3). Combined with base hero STR, the hero rarely faces a real threat. Consider: lower STR to +1, or add a drawback/condition.`;
      }
      if (eq.effect === 'roll_3_keep_best') comment = ` Rolling 3 dice and keeping best nearly guarantees a 5-6 roll. The variance reduction is too strong. Consider: roll 2 keep best, or 3 dice but you must use the middle value.`;
      if (eq.effect === 'roll_gamble') comment = ` The gamble rarely matters because +2 base STR is already strong. The 1-in-6 KO risk is too low to balance the +3 upside. Consider: wider KO range (1-2) or lower base STR to +1.`;
      if (eq.effect === 'roll_1_auto_win') comment = ` Auto-win on 1 is a 1/6 chance per fight on top of +2 STR. It's a win-more weapon. Consider: auto-win but with 0 STR, or auto-win only against enemies of STR 3 or less.`;
      if (eq.effect === 'dd_+2') comment = ` +2 base plus +2 in Dread Dungeons means +4 total where it matters most. Dread fights become trivial. Consider: +1 in Dread instead of +2, or make it conditional (only on first fight).`;
      if (eq.effect === 'exhaust_skill_+1') comment = ` The +2 STR base is already strong. The exhaust-for-+1 is just gravy. Consider: lower base to +1, making the exhaust decision more meaningful.`;
      if (eq.effect === 'win_roll_6_clear') comment = ` +2 STR is standard strong, but the "roll 6 clear all enemies" effect barely triggers. Not OP for the effect, just for the raw STR. Consider: lower to +1 STR, or make the clear effect trigger on 5-6.`;
      if (eq.effect === '+1_per_ready_skill') comment = ` +3 base plus +1 per ready skill means +7 with all skills ready. That's higher than most Misfortune enemies. Consider: +1 base with the scaling, or cap the bonus at +2 from skills.`;
      if (eq.effect === 'wonder_draw_legendary') comment = ` +2 STR is already strong. The Vanga effect (draw legendary on Wonder) accelerates equipment stacking. Consider: +1 STR, or the effect only triggers once per game.`;
      if (eq.effect === 'drain_1') comment = ` Drain is a +2 swing (+1 hero, -1 enemy). Combined with +1 base that's effectively +3. Consider: drain only applies to enemies STR 3+, or base STR 0.`;
      if (eq.effect === 'cannot_remove') comment = ` Surviving KO is powerful since KO strips all equipment. +2 STR on top makes it a must-keep. Consider: +1 STR, or the curse prevents Flame effects while equipped.`;
      if (eq.effect === 'peek_adjacent') comment = ` Not OP due to its effect (peek is spatial and barely matters in sim). High win rate is from other equipment. May show differently in real play.`;
      if (!comment && isOP) comment = ` High win rate likely from raw STR bonus stacking with hero base. Consider lowering STR or adding a conditional drawback.`;
    }
    if (isWeak) {
      comment = ` Heroes still lose fights despite having this. The benefit may be too situational or the STR too low to matter.`;
    }
    html += `<div class="report-card ${cls}">${tag}<b>${name}</b> (STR ${eq.str >= 0 ? '+' : ''}${eq.str || 0}) — equipped ${d.equipped}x, win rate ${wr}% (${d.wonWith}W/${d.lostWith}L)${d.survivedKO ? `, survived ${d.survivedKO} KOs` : ''}${comment ? `<br><i style="color:var(--dim)">${comment}</i>` : ''}</div>`;
  });
  html += `</div>`;

  // === ENCOUNTER BALANCE ===
  html += `<div class="report-section"><h3>Encounter Balance</h3>`;
  html += `<p style="color:var(--dim);font-size:10px;margin-bottom:8px">Only showing enemies with extreme win/loss rates. Balanced enemies (30-70% loss rate) are working as intended.</p>`;
  const encAgg = {};
  results.forEach(r => {
    Object.entries(r.tracker.encounters).forEach(([name, data]) => {
      if (!encAgg[name]) encAgg[name] = { drawn:0, won:0, lost:0, fled:0, avoided:0 };
      Object.keys(data).forEach(k => encAgg[name][k] += data[k]);
    });
  });
  Object.entries(encAgg).filter(([,d]) => d.drawn >= 3).sort((a,b) => {
    const lrA = a[1].lost / Math.max(1, a[1].won + a[1].lost);
    const lrB = b[1].lost / Math.max(1, b[1].won + b[1].lost);
    return lrB - lrA;
  }).forEach(([name, d]) => {
    const fights = d.won + d.lost;
    if (fights === 0) return;
    const lossRate = ((d.lost / fights) * 100).toFixed(0);
    const isOP = fights >= 4 && lossRate >= 70;
    const isWeak = fights >= 4 && lossRate <= 10;
    if (!isOP && !isWeak) return;
    const cls = isOP ? 'op' : 'weak';
    const tag = isOP ? '<span class="tag op-tag">OP</span>' : '<span class="tag weak-tag">Weak</span>';
    let comment = '';
    if (isOP) comment = `Heroes lose ${lossRate}% of the time (${d.lost}L/${d.won}W in ${d.drawn} games). This enemy may be too punishing without skills. Consider: lower STR by 1, add a flee condition, or let heroes use a follower to reduce damage.`;
    if (isWeak) comment = `Heroes win ${100-Number(lossRate)}% of the time (${d.won}W/${d.lost}L in ${d.drawn} games). Too easy even without skills. Consider: +1 STR, or add a twist that makes the fight less straightforward.`;
    html += `<div class="report-card ${cls}">${tag}<b>${name}</b> — ${comment}</div>`;
  });
  if (Object.entries(encAgg).filter(([,d]) => d.drawn >= 3).every(([,d]) => { const f=d.won+d.lost; return f<4||(d.lost/Math.max(1,f)*100>10&&d.lost/Math.max(1,f)*100<70); })) {
    html += `<div class="report-card insight"><span class="tag insight-tag">OK</span>No extreme outliers detected. All enemies with enough data fall in the 10-70% loss range.</div>`;
  }
  html += `</div>`;

  // === TALENT ANALYSIS ===
  html += `<div class="report-section"><h3>Talent Analysis</h3>`;
  html += `<p style="color:var(--dim);font-size:10px;margin-bottom:8px">Talents trigger on Flame (3/6 faces = 50% chance per roll). "Combat impact" = Flame rolled during a fight. "Movement impact" = Flame rolled for movement (triggers Awakening after tile 10).</p>`;
  const talentComments = {
    juju: (agg) => {
      const perGame = (agg.combatImpact / n).toFixed(1);
      let c = `<b>Unwavering Power (+2 combat):</b> Triggered in combat ${agg.combatImpact}x (${perGame}/game). `;
      if (perGame >= 1.5) c += `Strong impact. Juju gets a meaningful STR boost in roughly half his fights. The +2 is reliable enough to make him the party's main fighter.`;
      else if (perGame >= 0.8) c += `Moderate impact. Triggers about once per game in combat. Useful but not game-defining. Consider whether +2 is enough or if it should be +3 on a less frequent trigger.`;
      else c += `Low combat impact. Juju's talent mostly helps with Awakening (movement flames) rather than fights. Consider making it trigger on movement too, or increasing the combat bonus.`;
      return c;
    },
    gigi: (agg) => {
      let c = `<b>Nature's Gift (gift Flame to ally):</b> Triggered ${agg.triggered}x total. `;
      c += `Gifting Flame to another hero means THEIR talent fires next turn. It's a team-support talent that chains well. `;
      if (agg.blocked > 0) c += `Blocked ${agg.blocked}x by Cursed Beggar. `;
      c += `Hard to measure direct impact in simulation since it depends on who receives the gift. In real play, gifting to Juju (for +2) or Eggo (for Dodge) before a dangerous fight is the optimal play.`;
      return c;
    },
    lulu: (agg) => {
      let c = `<b>Arcane Recharge (recharge 1 skill):</b> Triggered ${agg.triggered}x total. `;
      c += `Recharging skills is extremely valuable once skills are added. Right now it recharges Skill Burn availability, which is useful but not as impactful. `;
      c += `This talent will become much stronger once you add real skill effects. Watch that it doesn't make Lulu's skills effectively unlimited.`;
      return c;
    },
    eggo: (agg) => {
      const dodgeSaves = Object.entries(results.reduce((s,r) => { const sk = r.tracker.skills; Object.entries(sk).forEach(([k,v]) => { if (k.includes('Dodge')) { s[k] = (s[k]||0) + v.savedFromKO; } }); return s; }, {}));
      const saves = dodgeSaves.reduce((s,[,v]) => s+v, 0);
      let c = `<b>Dodge (immune to KO this turn):</b> Triggered ${agg.triggered}x total. `;
      if (saves > 0) c += `Prevented ${saves} KOs across ${n} games (${(saves/n).toFixed(1)}/game). `;
      if (saves/n >= 0.5) c += `Very strong defensive talent. Eggo is significantly harder to kill than other heroes. `;
      else c += `Dodge activates often but most of the time Eggo wasn't going to be KO'd anyway. The insurance value is real though. `;
      c += `Consider: Dodge only lasts for ONE combat, not the whole turn, to add a decision layer.`;
      return c;
    }
  };
  heroIds.forEach(hid => {
    const agg = { triggered:0, blocked:0, combatImpact:0, movementImpact:0 };
    results.forEach(r => {
      const t = r.tracker.talents[hid];
      if (!t) return;
      Object.keys(agg).forEach(k => agg[k] += (t[k] || 0));
    });
    if (agg.triggered + agg.blocked === 0) return;
    const comment = talentComments[hid] ? talentComments[hid](agg) : '';
    html += `<div class="report-card"><b style="color:var(--${hid})">${heroNames[hid]}</b> — triggered ${agg.triggered}x, blocked ${agg.blocked}x<br>${comment}</div>`;
  });
  html += `</div>`;

  // === HYDRA HEAD ANALYSIS ===
  html += `<div class="report-section"><h3>Hydra Heads</h3>`;
  const headAgg = {};
  results.forEach(r => {
    Object.entries(r.tracker.hydraHeads).forEach(([name, data]) => {
      if (!headAgg[name]) headAgg[name] = { spawned:0, destroyed:0, causedKO:0, regenerated:0 };
      Object.keys(data).forEach(k => headAgg[name][k] += (data[k] || 0));
    });
  });
  const hydraRef = HYDRA_HEADS.reduce((m,h) => { m[h.name] = h; return m; }, {});
  const headComments = {
    'The Nest': (d, ref) => `STR ${ref.str}. While alive, all other heads get +2 STR. ${d.destroyed === 0 ? 'Never destroyed in simulation. This means the +2 buff is always active, making every other head 2 points harder. If heroes can\'t kill STR 7, they can\'t kill anything. Consider: lower to STR 5-6 so heroes can realistically prioritize it, or change the passive to +1.' : `Destroyed ${d.destroyed}x. When it goes down, the fight gets much easier. Good design.`}`,
    'The Brood': (d, ref) => `STR ${ref.str}. Disables all Flame effects (talents, Awakening). ${d.destroyed === 0 ? 'Never destroyed. Flame suppression means: no Juju +2, no Eggo Dodge, no Lulu recharge. This head neutralizes all talents permanently. Consider: lower STR to 6-7 so heroes can kill it, or make the suppression partial (e.g., only blocks talents, not Flame-triggered equipment).' : `Destroyed ${d.destroyed}x. Good counterplay target.`}`,
    'The Wail': (d, ref) => `STR ${ref.str}. On destroy: all heroes exhaust 1 Skill. ${d.destroyed === 0 ? 'Never destroyed. At STR 10 this head is nearly unkillable without skills. Heroes need total 10+ to beat it. Consider: lower to STR 8, or make the on-destroy effect less punishing (exhaust only the attacker).' : `Destroyed ${d.destroyed}x. The skill exhaust on death is a fair cost for removing a head.`}`,
    'The Spite': (d, ref) => `STR ${ref.str}. On destroy: grow 1 extra head. ${d.destroyed === 0 ? 'Never destroyed. At STR 12 this is essentially a wall. Even with max equipment (+3 weapon, +2 base, roll 6) heroes barely reach 11. Consider: lower to STR 9-10, since the growth penalty already makes it risky to destroy.' : `Destroyed ${d.destroyed}x. Growing a head on death is a great mechanic that creates tension.`}`,
    'The Fangs': (d, ref) => `STR ${ref.str}. When targeted: all heroes exhaust 1 Skill. ${d.destroyed === 0 ? 'Never destroyed. The on-attack trigger means heroes LOSE skills just for trying. At STR 9 it\'s also hard to kill. This head punishes aggression too much. Consider: lower to STR 7, or change to "attacker only exhaust 1" instead of all heroes.' : `Destroyed ${d.destroyed}x. Punishing but fair if killable.`}`,
    'The Maw': (d, ref) => `STR ${ref.str}. When targeted: discard 1 Equipment or -2. ${d.destroyed === 0 ? 'Never destroyed. Heroes must sacrifice equipment just to attempt an attack. At STR 8 with Nest bonus (+2 = 10), heroes need 10+ after losing equipment. Consider: lower to STR 6, or change to "discard OR -1" instead of -2.' : `Destroyed ${d.destroyed}x. Equipment sacrifice adds an interesting cost.`}`
  };
  Object.entries(headAgg).sort((a,b) => b[1].spawned - a[1].spawned).forEach(([name, d]) => {
    const killRate = d.spawned > 0 ? ((d.destroyed / d.spawned) * 100).toFixed(0) : 'N/A';
    const isHard = d.spawned >= 3 && killRate <= 30;
    const isEasy = d.spawned >= 3 && killRate >= 80;
    const cls = isHard ? 'op' : isEasy ? 'weak' : '';
    const tag = isHard ? '<span class="tag op-tag">Hard</span>' : isEasy ? '<span class="tag weak-tag">Easy</span>' : '';
    const ref = hydraRef[name] || {};
    const comment = headComments[name] ? headComments[name](d, ref) : '';
    html += `<div class="report-card ${cls}">${tag}<b>${name}</b> — spawned ${d.spawned}x, destroyed ${d.destroyed}x (${killRate}%), caused ${d.causedKO} KOs${comment ? `<br><i style="color:var(--dim)">${comment}</i>` : ''}</div>`;
  });
  html += `</div>`;

  // === TRAP ANALYSIS ===
  html += `<div class="report-section"><h3>Trap Lethality</h3>`;
  html += `<p style="color:var(--dim);font-size:10px;margin-bottom:8px">Traps that never KO anyone are "free" cards that don't create real danger. Consider adding teeth, or accept them as breather cards.</p>`;
  const trapAgg = {};
  results.forEach(r => {
    Object.entries(r.tracker.traps).forEach(([name, data]) => {
      if (!trapAgg[name]) trapAgg[name] = { triggered:0, survived:0, ko:0 };
      Object.keys(data).forEach(k => trapAgg[name][k] += (data[k] || 0));
    });
  });
  const trapComments = {
    'Hall of Mirrors': 'You fight yourself with 4 dice but no STR. Since the "enemy" has 0 STR and heroes have equipment + base STR, the hero almost always wins. Consider: the mirror copies your full STR, or rolls 4 dice AND adds your base STR.',
    'Spike Trap': 'Roll 1-3 = KO. That\'s 50% lethality on paper, but heroes have Skill Burn and talents to survive. If it never KOs, heroes may be too strong at the point it appears. Check if it appears early enough.',
    'The Tribute': 'Exhaust all OR go KO. Heroes always choose exhaust since they have skills. It\'s a resource drain, not a KO threat. Working as designed if you want resource pressure. Add "exhaust all AND lose 1 equipment" to add real teeth.',
    'Guillotine': 'KO if fewer than 2 ready skills. By the time this triggers, heroes usually have 2+ ready. Consider: KO if fewer than 3, or KO if no equipment.',
    'Static Fog': 'Blocks movement through a room. In simulation this barely matters (no real spatial board). In real play this could be more impactful.',
    'Spectral Theft': 'Discard 1 equipment. Never KOs directly but losing equipment hurts. Working as designed as resource pressure.',
    'Trap Alarm': 'Triggers a full Dread encounter (Legendary + Misfortune). Can lead to KO from the Misfortune, but the Legendary reward softens the blow.',
    'Magnetic Field': 'All heroes roll Flame or lose equipment. With 50% Flame chance and multiple heroes, someone usually loses something. This is group pressure, not individual lethality.',
    'Trap Door': 'Send back to entrance. No KO, just tempo loss. Consider: also exhaust 1 skill, or lose followers.',
    'Crumbling Floor': 'Roll 1-2 = KO (33% chance). If 0% in practice, heroes are rerolling with Skill Burn. Working as intended pressure.',
    'Giant Web': 'Exhaust 1 skill or KO. Usually a skill exhaust. Resource drain trap.'
  };
  Object.entries(trapAgg).filter(([,d]) => d.triggered >= 2).sort((a,b) => {
    const lA = a[1].ko / Math.max(1, a[1].triggered);
    const lB = b[1].ko / Math.max(1, b[1].triggered);
    return lB - lA;
  }).forEach(([name, d]) => {
    const lethality = ((d.ko / Math.max(1, d.triggered)) * 100).toFixed(0);
    const isLethal = lethality >= 50;
    const isHarmless = d.ko === 0 && d.triggered >= 3;
    const cls = isLethal ? 'op' : isHarmless ? 'weak' : '';
    const tag = isLethal ? '<span class="tag op-tag">Lethal</span>' : isHarmless ? '<span class="tag weak-tag">Harmless</span>' : '';
    const comment = trapComments[name] || '';
    html += `<div class="report-card ${cls}">${tag}<b>${name}</b> — ${d.triggered} triggers, ${d.ko} KOs (${lethality}%)${comment ? `<br><i style="color:var(--dim)">${comment}</i>` : ''}</div>`;
  });
  html += `</div>`;

  // === COMBAT TENSION ===
  const totalCloseCalls = results.reduce((s, r) => s + r.tracker.closeCalls.length, 0);
  const totalOverkills = results.reduce((s, r) => s + r.tracker.overkills.length, 0);
  html += `<div class="report-section"><h3>Combat Tension</h3>`;
  html += `<p style="color:var(--dim);font-size:10px;margin-bottom:8px">Close calls = won by 0-1 margin. Overkills = won by 5+ margin. A good game has close calls in roughly 30-50% of fights. Too many overkills = fights feel pointless. Too many close calls = feels punishing.</p>`;
  html += `<div class="report-card insight">`;
  html += `Close calls: <b>${totalCloseCalls}</b> (${(totalCloseCalls/n).toFixed(1)}/game) | Overkills: <b>${totalOverkills}</b> (${(totalOverkills/n).toFixed(1)}/game)<br><br>`;
  if (totalOverkills > totalCloseCalls * 2) {
    html += `<span class="tag weak-tag">Low Tension</span> Most fights are decided before the dice roll because hero STR is much higher than enemy STR. <b>Suggestion:</b> Increase average enemy STR by 1 across Mishap enemies, or reduce base weapon STR. This will create more close calls and make Skill Burn feel more important.`;
  } else if (totalCloseCalls > totalOverkills * 3) {
    html += `<span class="tag op-tag">High Tension</span> Fights are very tight. Heroes often win by the skin of their teeth. <b>What this means for design:</b> Any skill that gives +1 or +2 in combat will feel extremely impactful, because that's the typical margin between winning and losing. <b>Risk:</b> If KO rate is also high (${avgKO}+/game), players will feel the game is unfair. <b>Suggestion:</b> Either accept tight fights and add more KO-prevention skills, or slightly reduce enemy STR to create breathing room.`;
  } else {
    html += `<b>Balanced.</b> Good mix of close fights and comfortable wins. Skills that give +2 combat will turn roughly ${totalCloseCalls > 0 ? Math.round(totalCloseCalls * 0.6) : '?'} fights from close to comfortable, which feels satisfying without being broken.`;
  }
  html += `</div></div>`;

  // === DESIGN SUGGESTIONS ===
  html += `<div class="report-section"><h3>Design Suggestions</h3>`;
  html += `<p style="color:var(--dim);font-size:10px;margin-bottom:8px">Based on all data above. These are skill ideas and balance tweaks derived from what the heroes actually struggle with.</p>`;
  const allGaps = {};
  results.forEach(r => {
    Object.entries(r.tracker.heroes).forEach(([hid, ht]) => {
      if (!allGaps[hid]) allGaps[hid] = {};
      ht.neededButDidntHave.forEach(g => {
        if (!allGaps[hid][g.type]) allGaps[hid][g.type] = 0;
        allGaps[hid][g.type]++;
      });
    });
  });
  heroIds.forEach(hid => {
    const gaps = allGaps[hid] || {};
    const heroData = { combats:0, ko:0, wins:0, losses:0 };
    results.forEach(r => {
      const ht = r.tracker.heroes[hid];
      if (ht) { heroData.combats += ht.combats; heroData.ko += ht.ko; heroData.wins += ht.wins; heroData.losses += ht.losses; }
    });
    const suggestions = [];
    const closeLosses = gaps.close_loss || 0;
    const noEquipLosses = gaps.no_equip || 0;
    const outmatched = gaps.outmatched || 0;
    if (closeLosses >= n * 0.3) {
      suggestions.push(`Lost ${closeLosses} close fights (margin 1-2). A skill that gives +2 to Fate Die would have turned ~${Math.ceil(closeLosses * 0.7)} of these into wins. Alternatively: a "reduce enemy STR by 2" skill, a "negate enemy special effect" skill, or a "if you lose by 1-2, draw instead of KO" passive. Note: Skill Burn already covers rerolling both your die and the enemy die, so a pure reroll skill would be redundant.`);
    }
    if (noEquipLosses >= n * 0.2) {
      suggestions.push(`Fought ${noEquipLosses} times without equipment and lost. Needs a skill that compensates: "bare-handed +2", equipment retrieval, or summon a temporary weapon.`);
    }
    if (outmatched >= n * 0.3) {
      suggestions.push(`Was outmatched ${outmatched} times (margin 4+). Needs: a flee/redirect skill ("step aside, enemy moves to another room"), damage cap ("you can't lose more than 1 STR worth"), or enemy debuff ("reduce enemy STR by 2 before rolling").`);
    }
    if (heroData.ko / n > 2) {
      suggestions.push(`Averages ${(heroData.ko/n).toFixed(1)} KOs/game. Needs better survival: a KO-prevention skill, a "respawn with 1 equipment" passive, or stalker resistance.`);
    }
    if (heroData.combats > 0 && heroData.wins / heroData.combats < 0.4) {
      suggestions.push(`Combat win rate is only ${((heroData.wins/heroData.combats)*100).toFixed(0)}%. Base STR (${HEROES.find(h=>h.id===hid).str}) may be too low without skills. Consider: a permanent passive (+1 STR in specific conditions) or movement skills to avoid fights.`);
    }
    if (suggestions.length > 0) {
      html += `<div class="report-card need"><span class="tag need-tag">Skill Ideas</span><b style="color:var(--${hid})">${heroNames[hid]}</b><ul style="margin:4px 0 0 16px;padding:0">`;
      suggestions.forEach(s => { html += `<li style="margin:4px 0">${s}</li>`; });
      html += `</ul></div>`;
    }
  });

  if (winRate < 30) {
    html += `<div class="report-card op"><span class="tag op-tag">Too Hard</span>Win rate ${winRate}% without skills. Adding skills will raise this, but if skills only give +2 per fight and heroes need 4+ more to compete, the game may stay too hard. Consider: lower Hydra head STR by 2 across the board, or reduce tile deck Dread % from 25% to 15%.</div>`;
  } else if (winRate > 70) {
    html += `<div class="report-card weak"><span class="tag weak-tag">Too Easy</span>Win rate ${winRate}% even WITHOUT skills. Once skills are added, this will climb to 85-90%+. The game will feel like it plays itself. <b>Action items:</b> Increase Hydra head STR by 1-2, increase Dread room %, or reduce equipment STR across the board. Target: 40-55% base win rate without skills, so skills push it to 60-70%.</div>`;
  } else {
    html += `<div class="report-card insight"><span class="tag insight-tag">Good Baseline</span>Win rate ${winRate}% without skills is a solid foundation. Skills should push this to 60-75%, making them feel meaningful without trivializing the game.</div>`;
  }

  // Skill Burn summary
  html += `<div class="report-card insight"><span class="tag insight-tag">Skill Burn</span>`;
  const sbData = {};
  results.forEach(r => { Object.entries(r.tracker.skills).forEach(([k,v]) => { if (k.includes('Skill Burn') && v.turnedFight > 0) { const hid = k.split('_')[0]; sbData[hid] = (sbData[hid]||0) + v.turnedFight; } }); });
  if (Object.keys(sbData).length > 0) {
    html += `Skill Burn (exhaust a skill to reroll YOUR die or ENEMY die) turned fights: `;
    html += Object.entries(sbData).map(([hid,c]) => `<b style="color:var(--${hid})">${heroNames[hid]}</b>: ${c}x`).join(', ');
    html += `.<br>The AI picks whichever reroll (own or enemy) gives the best chance to win. Skills you create should compete with "just rerolling" in value. If a skill isn't worth more than a reroll, players will always Skill Burn instead of activating it.`;
  } else {
    html += `No Skill Burns turned fights in this batch. Heroes won or lost decisively without needing rerolls.`;
  }
  html += `</div>`;

  // Dodge talent saves (still relevant, it's a talent not a skill)
  const dodgeSaves = results.reduce((s,r) => { const sk = r.tracker.skills; let c = 0; Object.entries(sk).forEach(([k,v]) => { if (k.includes('Dodge')) c += v.savedFromKO; }); return s+c; }, 0);
  if (dodgeSaves > 0) {
    html += `<div class="report-card insight"><span class="tag insight-tag">Dodge Talent</span>Eggo's Dodge talent (not a skill) prevented <b>${dodgeSaves}</b> KOs across ${n} games (${(dodgeSaves/n).toFixed(1)}/game). This is the strongest defensive ability in the game currently. Any KO-prevention skill you design for other heroes should be compared against this benchmark.</div>`;
  }

  // Warden Angel saves
  const wardenSaves = results.reduce((s,r) => { const sk = r.tracker.skills; let c = 0; Object.entries(sk).forEach(([k,v]) => { if (k.includes('Warden Angel')) c += v.savedFromKO; }); return s+c; }, 0);
  if (wardenSaves > 0) {
    html += `<div class="report-card insight"><span class="tag insight-tag">Warden Angel</span>Warden Angel follower saved heroes from <b>${wardenSaves}</b> KOs. This follower acts like a free Relic. If it appears too often, it reduces the tension of combat and the value of Relics.</div>`;
  }

  html += `</div>`;
  return html;
}

// ========== BATCH RUN ==========
function runSilentGame() {
  G = initState();
  HEROES.forEach(h => initHeroTracker(G.tracker, h.id));
  let safety = 0;
  while (!G.gameOver && safety < 2000) {
    const hero = G.heroes[G.currentHero];
    G.turn++;
    G.stats.turns++;
    hero.talentUsedThisTurn = false;
    hero.dodgeActive = false;

    // Turn-start effects
    if (hero.equipment.find(e => e.effect === 'turn_start_recharge')) {
      if (Math.floor(Math.random() * 6) + 1 >= 4) rechargeOneSkill(hero);
    }
    // NOTE: No skill activations — skills still being designed

    // Hound
    if (hero.houndFollowing) {
      combat(hero, hero.houndFollowing, 'misfortune');
      hero.houndFollowing = null;
      if (G.gameOver) break;
    }

    if (hero.runningToHydra) {
      runToHydra(hero);
    } else if (G.hydraActive && G.heroesInHydraArea.has(hero.id)) {
      hydraAttack(hero);
    } else {
      movePhase(hero);
    }

    if (!G.gameOver) nextHero();
    safety++;
  }

  // Track stalker turns at end
  G.heroes.forEach(h => {
    h.stalkers.forEach(s => trackStalker(s.name, 'turnsActive'));
  });

  return {
    victory: G.victory,
    turn: G.turn,
    stats: {...G.stats},
    tracker: G.tracker,
    heroes: G.heroes.map(h => ({id:h.id, equipment:h.equipment.map(e=>e.name), relics:h.heldRelics.length, ko:initHeroTracker(G.tracker,h.id).ko}))
  };
}

function runBatch() {
  const count = parseInt(document.getElementById('batchCount').value) || 50;
  document.getElementById('batchBtn').disabled = true;
  document.getElementById('statusBar').textContent = `Running batch: 0/${count}...`;

  batchResults = [];
  // Suppress log output during batch
  const origLog = log;
  const silentLog = (msg, cls) => { G.log.push({msg, cls}); };

  let i = 0;
  function batchStep() {
    const batchSize = Math.min(5, count - i);
    for (let j = 0; j < batchSize; j++) {
      batchResults.push(runSilentGame());
      i++;
    }
    document.getElementById('statusBar').textContent = `Running batch: ${i}/${count}...`;
    if (i < count) {
      setTimeout(batchStep, 0);
    } else {
      lastReport = generateReport(batchResults);
      document.getElementById('batchBtn').disabled = false;
      document.getElementById('reportBtn').disabled = false;
      document.getElementById('statusBar').textContent = `Batch complete: ${count} games. Click Report to view analysis.`;
      showLastReport();
    }
  }
  setTimeout(batchStep, 10);
}

function showLastReport() {
  if (!lastReport) return;
  document.getElementById('reportContent').innerHTML = lastReport;
  document.getElementById('reportOverlay').style.display = 'flex';
}

function closeReport() {
  document.getElementById('reportOverlay').style.display = 'none';
}

// Also generate single-game report on game end
function onGameEnd() {
  if (!G) return;
  G.heroes.forEach(h => {
    h.stalkers.forEach(s => trackStalker(s.name, 'turnsActive'));
  });
  const result = {
    victory: G.victory,
    turn: G.turn,
    stats: {...G.stats},
    tracker: G.tracker,
    heroes: G.heroes.map(h => ({id:h.id, equipment:h.equipment.map(e=>e.name), relics:h.heldRelics.length, ko:initHeroTracker(G.tracker,h.id).ko}))
  };
  lastReport = generateReport([result]);
  document.getElementById('reportBtn').disabled = false;
}

// ========== CONTROLS ==========
function startGame() {
  stopAuto();
  G = initState();
  log('═══════════════════════════════════════', 'system');
  log('  JUJU\'S CASTLE — NEW GAME', 'turn-header');
  log('═══════════════════════════════════════', 'system');
  log('Party: Juju (STR 3), Gigi (STR 2), Lulu (STR 1), Eggo (STR 2)', 'system');
  log('All heroes start at the Entrance. 36 rooms to explore.', 'system');
  log(`Legendary Equipment deck: ${LEGENDARY_EQUIPMENT.length} items`, 'system');
  log('', 'system');
  document.getElementById('logPanel').innerHTML = '';
  document.getElementById('stepBtn').disabled = false;
  document.getElementById('autoBtn').disabled = false;
  render();
  if (document.getElementById('modeSelect').value === 'auto') {
    toggleAuto();
  }
}

function stepGame() {
  if (!G || G.gameOver) return;
  runTurn();
  if (G.gameOver) onGameEnd();
  render();
}

function toggleAuto() {
  if (autoRunning) {
    stopAuto();
  } else {
    autoRunning = true;
    document.getElementById('autoBtn').textContent = '⏸ Pause';
    document.getElementById('autoBtn').classList.add('primary');
    autoStep();
  }
}

function autoStep() {
  if (!autoRunning || !G || G.gameOver) {
    stopAuto();
    if (G && G.gameOver) onGameEnd();
    render();
    return;
  }
  runTurn();
  render();
  const speed = document.getElementById('speedSlider').value;
  const delay = Math.max(10, 1000 - speed * 10);
  autoTimer = setTimeout(autoStep, delay);
}

function stopAuto() {
  autoRunning = false;
  if (autoTimer) clearTimeout(autoTimer);
  autoTimer = null;
  document.getElementById('autoBtn').textContent = '▶ Auto';
  document.getElementById('autoBtn').classList.remove('primary');
}

function resetGame() {
  stopAuto();
  G = null;
  document.getElementById('logPanel').innerHTML = '';
  document.getElementById('heroPanel').innerHTML = '';
  document.getElementById('infoPanel').innerHTML = '';
  document.getElementById('statusBar').textContent = 'Ready. Press New Game.';
  document.getElementById('stepBtn').disabled = true;
  document.getElementById('autoBtn').disabled = true;
}

document.getElementById('statusBar').textContent = 'Ready. Press New Game.';
</script>
